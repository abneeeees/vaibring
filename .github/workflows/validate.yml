name: Validate sites.json

on:
  pull_request:
    paths:
      - 'webring/sites.json'

jobs:
  validate:
    name: Validate ring data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validation
        run: node scripts/validate.js
